server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /pms {
        return 301 /pms/;
    }

    location /pms/ {
        try_files $uri $uri/ /pms/index.html;
    }

    location /pms/assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
