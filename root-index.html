<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DATC-PMS</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: rgba(255, 255, 255, 0.92);
      --text: #172033;
      --muted: #5e6b84;
      --line: rgba(23, 32, 51, 0.08);
      --accent: #1677ff;
      --shadow: 0 12px 36px rgba(18, 36, 66, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(1000px 600px at 10% 0%, rgba(22, 119, 255, 0.1), transparent 60%),
        radial-gradient(800px 500px at 100% 0%, rgba(88, 86, 214, 0.08), transparent 55%),
        var(--bg);
      color: var(--text);
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 32px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(22, 119, 255, 0.1);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(30px, 5vw, 42px);
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      padding: 12px 18px;
      border-radius: 16px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(22, 119, 255, 0.2);
    }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">DATC-PMS</span>
    <h1>工艺管理系统入口</h1>
    <p>当前系统已部署在子路径 <strong>/pms/</strong> 下。<br />点击下方按钮即可进入正式系统。</p>
    <div class="actions">
      <a class="btn" href="/pms/">进入系统</a>
      <a class="btn btn-secondary" href="/pms/login">前往登录页</a>
    </div>
  </main>
</body>
</html>
